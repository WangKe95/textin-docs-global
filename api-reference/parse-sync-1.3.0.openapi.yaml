openapi: 3.0.3
info:
  title: XParse Parse Sync API
  description: |
    Intelligent Document Parsing
  version: 1.3.0
  contact:
    name: TextIn API Team

servers:
  - url: https://api.textin.ai
    description: Production Environment

security:
  - AppIdAuth: []
    SecretCodeAuth: []

paths:
  /api/v1/xparse/parse/sync:
    post:
      summary: Document Parsing
      description: |
        Parse unstructured documents (image/pdf/word/html/excel/ppt/txt, etc.) into AI-friendly structured data (JSON, Markdown), with rich metadata (traceable, explainable, and verifiable)
      operationId: parseSync
      tags:
        - XParse Parse
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Upload document file, mutually exclusive with file_url
                file_url:
                  type: string
                  description: Document URL, mutually exclusive with file
                config:
                  allOf:
                    - $ref: '#/components/schemas/ParseConfig'
                  example:
                    # schema_version: "1.3.0"
                    document:
                      password: "example-pdf-password"
                    capabilities:
                      include_hierarchy: true
                      include_inline_objects: true
                      include_char_details: true
                      include_image_data: true
                      include_table_structure: true
                      pages: true
                      title_tree: true
                      table_view: "html"
                      remove_watermark: true
                      crop_dewarp: true
                    scope:
                      page_range: "1-2"
                    config:
                      force_engine: "textin"
                      engine_params:
                        parse_mode: "scan"
                        formula_level: 0
                        image_output_type: "url"
                        recognize_chemical: true
            encoding:
              file:
                contentType: application/octet-stream
              config:
                contentType: application/json
      responses:
        '200':
          description: Parsing Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                success:
                  summary: Success Example
                  value:
                    code: 200
                    message: "success"
                    data:
                      schema_version: "1.3.0"
                      file_id: "doc_7f3a2b"
                      job_id: "job_x9k2m"
                      success_count: 2
                      metadata:
                        filename: "quarterly_report.pdf"
                        filetype: "application/pdf"
                        page_count: 2
                        data_source:
                          record_locator:
                            protocol: "file"
                            remote_file_path: "/projects/demo/quarterly_report.pdf"
                          url: "file:///projects/demo/quarterly_report.pdf"
                      markdown: "# 检验结果\n\n<table>\n  <thead>\n    <tr><th>项目</th><th>公式项</th><th>参考范围</th></tr>\n  </thead>\n  <tbody>\n    <tr><td>空腹血糖</td><td>x^2+1</td><td>3.9-6.1</td></tr>\n  </tbody>\n</table>\n\n乙方签字：李四\n\n设违约金函数f(x)=x^2+1。\n该违约金函数适用于逾期超过30日的场景。"
