                  summary: Internal Server Error
                  value:
                    code: 500
                    message: "Internal server error"

components:
  securitySchemes:
    AppIdAuth:
      type: apiKey
      in: header
      name: x-ti-app-id
      description: 'Please [log in to Textin](https://www.textin.ai/console/dashboard/setting) and navigate to "Console - Account Settings - Developer Information" to view x-ti-app-id'
    SecretCodeAuth:
      type: apiKey
      in: header
      name: x-ti-secret-code
      description: 'Please [log in to Textin](https://www.textin.ai/console/dashboard/setting) and navigate to "Console - Account Settings - Developer Information" to view x-ti-secret-code'

  schemas:
    # ──────────────────────────────────────
    # Request config
    # ──────────────────────────────────────
    ParseConfig:
      type: object
      description: Parsing configuration parameters
      properties:
        # schema_version:
        #   type: string
        #   default: '1.3.0'
        #   description: Target schema version
        document:
          $ref: '#/components/schemas/DocumentConfig'
        capabilities:
          $ref: '#/components/schemas/Capabilities'
        scope:
          $ref: '#/components/schemas/Scope'
        config:
          $ref: '#/components/schemas/ExpertConfig'

    DocumentConfig:
      type: object
      description: Document-related configuration
      properties:
        password:
          type: string
          description: Document password (e.g., for encrypted PDF)

    Capabilities:
      type: object
      description: Parsing strategy and format configuration
      properties:
        include_hierarchy:
          type: boolean
          default: true
          description: Whether to return hierarchy and relationship fields between elements. When enabled, returns parent-child relationships, reference relationships, and other information between elements (such as parent_id, children_ids, ref_element_id) to express the structured relationship graph of the document.
        include_inline_objects:
          type: boolean
          default: false
          description: Whether to return fine-grained objects. When enabled, text elements will return the fine-grained objects they contain (such as formulas, images, handwritten signatures, checkboxes, etc.). If table structure is also enabled, inline objects within table cells will also be identified and returned.
        include_char_details:
          type: boolean
          default: false
          description: Whether to return character-level details (char_details). When enabled, returns detailed information for each character in the text (such as coordinates, confidence, candidate characters). If table structure is also enabled, characters within table cells will also return such details.
        include_image_data:
          type: boolean
          default: false
          description: Whether to return image data (image_data). When enabled, image elements will return complete image data (including image URL, MIME type, Base64 encoding, and text recognized in the image). If images appear as inline objects in text or table cells, the system will also automatically supplement corresponding image information.
        include_table_structure:
          type: boolean
          default: false
          description: Whether to return detailed structural information of tables. When enabled, returns the rows, columns, and detailed information of each cell in JSON format.
        pages:
          type: boolean
          default: false
          description: Whether to return page metadata list, including page number, width, height, rotation angle, rendered image URL (page_image_url), list of contained elements (element_ids), etc.
        title_tree:
          type: boolean
          default: false
          description: Whether to return the title tree (table of contents).
        table_view:
          type: string
          enum: [markdown, html]
          default: html
          description: The format for tables in markdown.
        remove_watermark:
          type: boolean
          default: false
          description: Whether to perform watermark removal preprocessing on the document.
        crop_dewarp:
          type: boolean
          default: false
          description: Whether to perform cropping and dewarping preprocessing on the document.

    Scope:
      type: object
      description: Processing scope control
      properties:
        page_range:
          type: string
          description: Page range, starting from 1, supports multiple closed intervals, e.g., "1-2,3-4,5-10"
          example: '1-5'

    ExpertConfig:
      type: object
      description: Advanced configuration (expert mode)
      properties:
        force_engine:
          type: string
          enum: [textin, textin_gui]
          description: Force specify internal engine, for expert mode use only.
        engine_params:
          type: object
          additionalProperties: true
          description: Engine-level custom parameters

    # ──────────────────────────────────────
    # API response wrapper
    # ──────────────────────────────────────
    ApiResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: |
            Status code
            - 200: Success
            - 40101: x-ti-app-id or x-ti-secret-code is empty
            - 40102: x-ti-app-id or x-ti-secret-code is invalid, authentication failed
            - 40103: Client IP is not in the whitelist
            - 40003: Insufficient balance, please recharge before using
            - 40004: Parameter error, please check the technical documentation and verify the parameters
            - 40007: Robot does not exist or is not published
            - 40008: Robot is not activated, please activate it from the market before retrying
            - 40301: Image type not supported
            - 40302: Uploaded file size does not meet requirements, file size must not exceed 500M
            - 40303: File type not supported. The API will return the actual detected file type, e.g., "Current file type is .gif"
            - 40304: Image dimensions do not meet requirements. Images with aspect ratio less than 2 must have width and height between 20~20000 pixels, other images must have width and height between 20~10000 pixels
            - 40305: Recognition file not uploaded
            - 40306: QPS exceeds limit
            - 40307: Daily free quota exhausted
            - 40422: The file is corrupted
            - 40423: Password required or incorrect password
            - 40424: Page number out of range
            - 40425: The input file format is not supported
            - 40427: Input DPI is not in the allowed DPIs list (72,144,216)
            - 40428: Process office file failed or timeout
            - 40429: Unsupported Engine
            - 50207: Partial failed
            - 40400: Invalid request URL, please check if the URL is correct
            - 30203: Basic service failure, please retry later
            - 500: Internal server error
          enum:
            - 200
            - 40101
            - 40102
            - 40103
            - 40003
            - 40004
            - 40007
            - 40008
            - 40301
            - 40302
            - 40303
            - 40304
            - 40305
            - 40306
            - 40307
            - 40422
            - 40423
            - 40424
            - 40425
            - 40427
            - 40428
            - 40429
            - 50207
            - 40400
            - 30203
            - 500
          example: 200
        message:
          type: string
          description: Status message
          example: "success"
        location:
          $ref: '#/components/schemas/ErrorLocation'
        data:
          $ref: '#/components/schemas/ParseResponse'

    ErrorLocation:
      type: object
      description: Error location information, returned only when parsing errors occur
      properties:
        stage:
          type: string
          description: Error stage
        page_number:
          type: integer
          description: Page number where error occurred
        element_id:
          type: string
          description: Element ID where error occurred

    # ──────────────────────────────────────
    # Response data
    # ──────────────────────────────────────
    ParseResponse:
      type: object
      required:
        - schema_version
        - file_id
        - job_id
        - success_count
        - metadata
        - elements
      properties:
        schema_version:
          type: string
          example: '1.3.0'
        file_id:
          type: string
          description: Unique document identifier
        job_id:
          type: string
          description: Unique task identifier
        success_count:
          type: integer
          description: Billable page count / successful page count
        metadata:
          $ref: '#/components/schemas/DocumentMetadata'
        elements:
          type: array
          description: Collection of basic semantic elements
          items:
            $ref: '#/components/schemas/Element'
        title_tree:
          type: array
          items:
            $ref: '#/components/schemas/TitleTreeNode'
          description: Returned on demand, title tree (table of contents)
        # table_objects:
        #   type: array
        #   items:
        #     $ref: '#/components/schemas/TableObject'
        #   description: Returned on demand, logical whole table aggregation objects (not yet implemented)
        markdown:
          type: string
          description: Document-level Markdown
        pages:
          type: array
          description: Page information list
          items:
            $ref: '#/components/schemas/Page'
        summary:
          $ref: '#/components/schemas/Summary'

    DocumentMetadata:
      type: object
      description: Document metadata
      properties:
        filename:
          type: string
        filetype:
          type: string
          description: MIME type
        page_count:
          type: integer
        data_source:
          $ref: '#/components/schemas/DataSource'

    # ──────────────────────────────────────
    # Element
    # ──────────────────────────────────────
    Element:
      type: object
      required:
        - element_id
        - type
        - text
        - page_number
        - coordinates
        - metadata
      properties:
        element_id:
          type: string
          description: Unique element identifier
        type:
          type: string
          description: |
            Element type. **GUI engine uses different element types** (such as button, input, checkbox, etc.), see [GUI Element Types](#ui-element-types) for details.
          enum:
            - Title
            - NarrativeText
            - ListItem
            - CodeSnippet
            - UncategorizedText
            - Table
            - Image
            - Formula
            - Chemical
            - Header
            - Footer
            - PageNumber
            - FigureCaption
            - PageBreak
            - TableCaption
        sub_type:
          type: string
          description: |
           Element subtype, optional, used for further subdivision within the same main type:
           | type | sub_type |
           |---|---|
           | Image | stamp, qrcode, barcode, chart |
           | Table | bordered, borderless |
        text:
          type: string
          description: Semantic text content of the element, serving as the textual representation of this element
        page_number:
          type: integer
          minimum: 1
          description: Page number where the element is located, starting from 1
        coordinates:
          $ref: '#/components/schemas/Coordinates'
        objects:
          type: array
          items:
            $ref: '#/components/schemas/InlineObject'
          description: List of fine-grained objects appearing in order within the element, such as formulas, handwriting, checkboxes in paragraphs, returned only when include_inline_objects=true
        table_structure:
          $ref: '#/components/schemas/TableStructure'
        char_details:
          type: array
          description: Character-level detailed information, returned only when include_char_details=true; applicable only to text elements
          items:
            $ref: '#/components/schemas/CharDetail'
        image_data:
          $ref: '#/components/schemas/ImageData'
        metadata:
          $ref: '#/components/schemas/ElementMetadata'

    ElementMetadata:
      type: object
      properties:
        parent_id:
          type: string
          description: Parent element ID
        children_ids:
          type: array
          description: List of child element IDs
          items:
            type: string
        category_depth:
          type: integer
          description: Nesting depth of elements of the same type, e.g., 0 for Title indicates level 1 heading, 1 indicates level 2 heading; 0 for ListItem indicates top-level list, 1 indicates nested list
        ref_element_id:
          type: string
          description: Another element ID directly associated with the current element, such as the association between an image/table and its caption.
        is_continuation:
          type: boolean
          description: Whether this is a cross-page or cross-column continuation block
        continuation_of:
          type: string
          description: When is_continuation=true, points to the element ID of the previous continuation block. For example, when a table spans pages, the Table element on the second page points to the Table element on the first page through this field
        has_inline_objects:
          type: boolean
          description: Whether it contains sub-objects, such as formulas in text, images in table cells, etc.
        inline_object_types:
          type: array
          description: List of object types contained within this element
          items:
            type: string
        width:
          type: integer
          description: Image width, for Image elements only
        height:
          type: integer
          description: Image height, for Image elements only
        interactivity:
          type: boolean
          description: Whether the GUI element is interactive
        description:
          type: string
          description: Semantic description of the element
        data_source:
          $ref: '#/components/schemas/DataSource'

    # ──────────────────────────────────────
    # Object
    # ──────────────────────────────────────
    InlineObject:
      type: object
      required:
        - object_id
        - type
        - text
        - coordinates
      properties:
        object_id:
          type: string
        type:
          type: string
          description: Object type, such as formula, handwriting, checkbox, image
        sub_type:
          type: string
        text:
          type: string
        text_range:
          type: array
          items:
            type: integer
          minItems: 2
          maxItems: 2
          description: Range of the object in the text [start, end), 0-based half-open interval
        coordinates:
          $ref: '#/components/schemas/Coordinates'
        image_data:
          $ref: '#/components/schemas/ImageData'
        metadata:
          type: object
          properties:
            display_mode:
              type: string
              enum: [inline, display]
              description: Formula display mode, inline for in-line, display for block-level

    # ──────────────────────────────────────
    # Table Structure
    # ──────────────────────────────────────
    TableStructure:
      type: object
      description: Structured details of a table fragment, returned only when type=Table and include_table_structure=true
      properties:
        rows:
          type: integer
          description: Number of rows
        cols:
          type: integer
          description: Number of columns
        cells:
          type: array
          description: List of cells
          items:
            $ref: '#/components/schemas/Cell'

    Cell:
      type: object
      required:
        - cell_id
        - row
        - col
        - row_span
        - col_span
        - content_type
        - text
        - coordinates
      properties:
        cell_id:
          type: string
        row:
          type: integer
          minimum: 1
        col:
          type: integer
          minimum: 1
        row_span:
          type: integer
        col_span:
          type: integer
        content_type:
          type: string
          enum: [text, formula, image, mixed]
        text:
          type: string
        coordinates:
          $ref: '#/components/schemas/Coordinates'
        image_datas:
          type: array
          description: Array of images within the cell, supports multiple images. For more version differences, see [Schema Version Migration Guide](/xparse/schema-migration)
          items:
            $ref: '#/components/schemas/ImageData'
        objects:
          type: array
          items:
            $ref: '#/components/schemas/InlineObject'
          description: Fine-grained objects embedded in the cell, returned only when content_type is text/mixed and include_inline_objects=true
        char_details:
          type: array
          items:
            $ref: '#/components/schemas/CharDetail'

    # ──────────────────────────────────────
    # Char Details
    # ──────────────────────────────────────
    CharDetail:
      type: object
      description: Character detail information
      properties:
        index:
          type: integer
          description: Character index in the text
        text:
          type: string
          description: Final recognized character
        coordinates:
          $ref: '#/components/schemas/Coordinates'
        recognition:
          $ref: '#/components/schemas/Recognition'
        # style:
        #   $ref: '#/components/schemas/CharStyle'

    Recognition:
      type: object
      description: Recognition information, including confidence and candidate character list
      properties:
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Final character confidence, range [0,1]
        candidates:
          type: array
          description: List of candidate characters
          items:
            type: object
            properties:
              text:
                type: string
                description: Candidate character
              confidence:
                type: number
                description: Candidate character confidence

    # CharStyle:
    #   type: object
    #   description: Style information (not yet implemented)
    #   properties:
    #     bold:
    #       type: boolean
    #     italic:
    #       type: boolean
    #     underline:
    #       type: boolean
    #     strikethrough:
    #       type: boolean
    #     emphasis_dot:
    #       type: boolean
    #     text_color:
    #       type: string
    #     background_color:
    #       type: string

    # ──────────────────────────────────────
    # Image Data
    # ──────────────────────────────────────
    ImageData:
      type: object
      description: Image data, returned only when type=Image and include_image_data=true
      properties:
        image_url:
          type: string
          description: Image URL
        mime_type:
          type: string
          description: Image MIME type
        base64:
          type: string
          description: Image base64, optional

    # ──────────────────────────────────────
    # Title Tree
    # ──────────────────────────────────────
    TitleTreeNode:
      type: object
      description: Title node
      properties:
        element_id:
          type: string
          description: ID of the corresponding Title element
        title:
          type: string
          description: Title text
        level:
          type: integer
          minimum: 1
          description: Title level, 1 is the highest
        page_number:
          type: integer
          description: Page number where the title is located
        children:
          type: array
          description: Nested child title nodes
          items:
            $ref: '#/components/schemas/TitleTreeNode'

    # ──────────────────────────────────────
    # Table Object (not yet implemented)
    # ──────────────────────────────────────
    # TableObject:
    #   type: object
    #   properties:
    #     table_object_id:
    #       type: string
    #     table_element_ids:
    #       type: array
    #       items:
    #         type: string
    #     caption_element_ids:
    #       type: array
    #       items:
    #         type: string
    #     data:
    #       type: object
    #       properties:
    #         caption:
    #           type: string
    #         summary_text:
    #           type: string
    #         html:
    #           type: string
    #         markdown:
    #           type: string

    # ──────────────────────────────────────
    # Page
    # ──────────────────────────────────────
    Page:
      type: object
      description: Page information
      properties:
        page_number:
          type: integer
          description: Page number
        page_width:
          type: number
          description: Page width
        page_height:
          type: number
          description: Page height
        page_image_url:
          type: string
          description: Page rendering image URL
        element_ids:
          type: array
          description: List of element IDs contained on this page, in the order of default reading order on the page
          items:
            type: string
        dpi:
          type: integer
          description: DPI used when converting the current page to an image
        angle:
          type: number
          description: Page rotation angle. Defining 0 degrees as the orientation of the image for human reading of text, called upright image, this field represents the rotation angle obtained by clockwise rotation of the upright image.
        status:
          type: string
          description: Page processing status


    # ──────────────────────────────────────
    # Summary
    # ──────────────────────────────────────
    Summary:
      type: object
      description: Processing summary
      properties:
        duration_ms:
          type: number
          description: Total processing time (milliseconds)

    # ──────────────────────────────────────
    # DataSource
    # ──────────────────────────────────────
    DataSource:
      type: object
      description: Detailed data source information
      properties:
        record_locator:
          type: object
          properties:
            protocol:
              type: string
              description: Protocol type
              example: "file"
            remote_file_path:
              type: string
              description: Remote file path
              example: "/projects/demo/example.pdf"
        url:
          type: string
          description: Complete file URL
          example: "file:///projects/demo/example.pdf"

    # ──────────────────────────────────────
    # Coordinates
    # ──────────────────────────────────────
    Coordinates:
      type: array
      items:
        type: number
      minItems: 8
      maxItems: 8
      description: Normalized quadrilateral coordinates [x1,y1,x2,y2,x3,y3,x4,y4], in the order of top-left, top-right, bottom-right, bottom-left. Coordinate values range [0,1], preserved to six significant digits.

tags:
  - name: XParse Parse
    description: |
      Standalone document parsing API interface

      ## Features
      - 📄 Multi-format Support: Supports PDF, images, and various other document formats
      - 🔍 Multi-engine Support: Supports TextIn, GUI, and other parsing engines
      - 📊 Structured Output: Converts documents into standardized element structures
      - 🎯 Semantic Preservation: Preserves the semantic structure of documents, such as titles, paragraphs, tables, etc.

      ## Billing Information
      - Billed based on the number of pages processed
      - Billing information is associated through x-ti-app-id and x-ti-secret-code
